syntax = "proto3";

package greeter;

option go_package = "./pb";


// Greeter gRPC 服务定义
service Greeter {
  // SayHello greets a user.
  rpc SayHello (SayHelloRequest) returns (SayHelloResponse);
  // GetStatus returns the current service status.
  rpc GetStatus (GetStatusRequest) returns (GetStatusResponse);
}


